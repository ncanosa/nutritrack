<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NutriTrack · Nahuel AI</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e17">

<style>
  :root {
    --bg: #0b101a; --card: #161b29; --accent: #4ade80; 
    --text: #f0f3f8; --text-dim: #94a3b8; --border: #2d3748;
    --prot: #60a5fa; --carb: #fbbf24; --fat: #f87171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    margin:0; font-family: -apple-system, system-ui, sans-serif; 
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding-bottom: 80px;
  }
  
  .container { max-width: 500px; margin: 0 auto; padding: 20px; }
  
  /* Header & Macros */
  header { margin-bottom: 25px; text-align: center; }
  .main-card { 
    background: var(--card); padding: 20px; border-radius: 20px; 
    border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .kcal-title { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .kcal-value { font-size: 3rem; font-weight: 800; margin: 5px 0; color: var(--accent); }
  
  .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
  .macro-item { text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
  .macro-label { font-size: 0.7rem; display: block; margin-bottom: 4px; opacity: 0.7; }
  .macro-num { font-weight: 700; font-size: 1.1rem; }

  /* AI Section */
  .ai-section { margin-bottom: 25px; }
  .ai-btn { 
    width: 100%; padding: 16px; border-radius: 15px; border: none;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white; font-weight: 700; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }
  .ai-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  
  .ai-response-card {
    background: #1e2536; border-left: 4px solid #a855f7;
    padding: 15px; border-radius: 12px; margin-top: 15px;
    font-size: 0.95rem; animation: fadeIn 0.5s ease;
  }

  /* Listas */
  .section-title { font-size: 1.2rem; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
  .meal-card { 
    background: var(--card); padding: 15px; border-radius: 15px; 
    margin-bottom: 12px; border: 1px solid var(--border);
  }
  
  /* Settings Float */
  .settings-trigger {
    position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; z-index: 100; cursor: pointer;
  }

  /* Modal Config */
  #configModal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .modal-content {
    background: var(--card); width: 100%; max-width: 400px;
    padding: 25px; border-radius: 20px; border: 1px solid var(--border);
  }
  input[type="password"], input[type="text"] {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: white; margin: 10px 0;
  }
  .btn-save {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: var(--accent); color: #000; font-weight: 700;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #333; padding: 10px 20px; border-radius: 20px; z-index: 2000;
    display: none; font-size: 0.9rem;
  }
  .toast.show { display: block; animation: fadeIn 0.3s; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h2 id="displayDate">Hoy</h2>
  </header>

  <div class="main-card">
    <div class="kcal-title">Calorías Restantes</div>
    <div class="kcal-value" id="res-kcal">0</div>
    
    <div class="macro-grid">
      <div class="macro-item">
        <span class="macro-label" style="color:var(--prot)">Proteína</span>
        <span class="macro-num" id="res-prot">0g</span>
      </div>
      <div class="macro-item">
        <span class="macro-label" style="color:var(--carb)">Carbos</span>
        <span class="macro-num" id="res-carb">0g</span>
      </div>
      <div class="macro-item">
        <span class="macro-label" style="color:var(--fat)">Grasas</span>
        <span class="macro-num" id="res-fat">0g</span>
      </div>
    </div>
  </div>

  <div class="ai-section">
    <button class="ai-btn" onclick="askGemini()">
      <span>✨ IA Sugerencias</span>
    </button>
    <div id="aiResponseContainer"></div>
  </div>

  <div class="section-title">Comidas de hoy</div>
  <div id="mealsList"></div>
  
  <div style="margin-top:20px; opacity:0.6; font-size:0.8rem; text-align:center;">
    Base de datos local guardada en este dispositivo.
  </div>
</div>

<div class="settings-trigger" onclick="toggleModal(true)">⚙️</div>

<div id="configModal">
  <div class="modal-content">
    <h3>Configuración IA</h3>
    <p style="font-size:0.8rem; color:var(--text-dim)">Pega tu API Key de Google Gemini para activar las sugerencias inteligentes.</p>
    <input type="password" id="apiKeyInput" placeholder="Pega tu AIzaSy... aquí">
    <button class="btn-save" onclick="saveKey()">Guardar Cambios</button>
    <button onclick="toggleModal(false)" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer;">Cerrar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURACIÓN INICIAL
const TARGETS = { kcal: 2800, prot: 200, carb: 350, fat: 60 };
let dailyMeals = JSON.parse(localStorage.getItem('nutri_meals') || '[]');

// Lógica de UI
function updateUI() {
  const totals = dailyMeals.reduce((acc, meal) => {
    acc.kcal += meal.kcal; acc.prot += meal.prot;
    acc.carb += meal.carb; acc.fat += meal.fat;
    return acc;
  }, { kcal: 0, prot: 0, carb: 0, fat: 0 });

  document.getElementById('res-kcal').textContent = Math.max(0, TARGETS.kcal - totals.kcal);
  document.getElementById('res-prot').textContent = Math.max(0, TARGETS.prot - totals.prot) + 'g';
  document.getElementById('res-carb').textContent = Math.max(0, TARGETS.carb - totals.carb) + 'g';
  document.getElementById('res-fat').textContent = Math.max(0, TARGETS.fat - totals.fat) + 'g';

  const list = document.getElementById('mealsList');
  if(dailyMeals.length === 0) {
    list.innerHTML = `<div style="text-align:center; padding:20px; opacity:0.5;">No hay comidas registradas aún.</div>`;
  } else {
    list.innerHTML = dailyMeals.map(m => `
      <div class="meal-card">
        <div style="font-weight:bold">${m.name}</div>
        <div style="font-size:0.8rem; color:var(--text-dim)">${m.kcal} kcal | P: ${m.prot}g C: ${m.carb}g G: ${m.fat}g</div>
      </div>
    `).join('');
  }
}

// LÓGICA DE IA (GEMINI)
async function askGemini() {
  const key = localStorage.getItem('gemini_api_key');
  if(!key) {
    showToast("Por favor, configura tu API Key primero en el icono de ⚙️");
    toggleModal(true);
    return;
  }

  const container = document.getElementById('aiResponseContainer');
  const btn = document.querySelector('.ai-btn');
  
  // Calcular lo que falta
  const totals = dailyMeals.reduce((acc, meal) => {
    acc.kcal += meal.kcal; acc.prot += meal.prot;
    acc.carb += meal.carb; acc.fat += meal.fat;
    return acc;
  }, { kcal: 0, prot: 0, carb: 0, fat: 0 });

  const falta = {
    kcal: TARGETS.kcal - totals.kcal,
    p: TARGETS.prot - totals.prot,
    c: TARGETS.carb - totals.carb,
    g: TARGETS.fat - totals.fat
  };

  if(falta.kcal <= 0) {
    container.innerHTML = `<div class="ai-response-card">💪 ¡Ya alcanzaste tus objetivos de hoy! Buen trabajo.</div>`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = "<span>🧠 Pensando...</span>";
  container.innerHTML = `<div style="text-align:center; padding:15px;">Analizando tus macros...</div>`;

  const prompt = `Actúa como un experto en nutrición. Mi objetivo diario es 2800 kcal. 
  Hoy ya comí algo, y me faltan exactamente: ${falta.kcal} calorías, ${falta.p}g de proteína, ${falta.c}g de carbohidratos y ${falta.g}g de grasa.
  Sugerime 2 opciones de comidas o snacks que me ayuden a completar estos números. 
  Usa ingredientes comunes en Argentina. Sé breve, directo y motivador. No uses negritas excesivas ni títulos largos.`;

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    });

    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    
    const text = data.candidates[0].content.parts[0].text;
    container.innerHTML = `<div class="ai-response-card">${text.replace(/\n/g, '<br>')}</div>`;

  } catch (err) {
    console.error(err);
    showToast("Error: " + err.message);
    container.innerHTML = "";
  } finally {
    btn.disabled = false;
    btn.innerHTML = "<span>✨ IA Sugerencias</span>";
  }
}

// UTILIDADES
function toggleModal(show) {
  document.getElementById('configModal').style.display = show ? 'flex' : 'none';
}

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if(val) {
    localStorage.setItem('gemini_api_key', val);
    showToast("¡Llave guardada correctamente!");
    toggleModal(false);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Carga inicial
window.onload = updateUI;
</script>

</body>
</html>
