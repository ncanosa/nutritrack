<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NutriTrack · Nahuel</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriTrack">
<meta name="theme-color" content="#0b0e17">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0e17; --bg2:#111420; --bg3:#181c2a; --card:#1c2033;
  --border:#252a3d; --border2:#2e3450;
  --green:#3dd68c; --cyan:#22d3ee; --amber:#fbbf24;
  --red:#f87171; --purple:#a78bfa; --blue:#60a5fa;
  --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;font-size:14px;padding-bottom:calc(20px + var(--safe-bot));}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px;position:relative;z-index:1;}
header{border-bottom:1px solid var(--border);padding:calc(14px + var(--safe-top)) 0 14px;margin-bottom:20px;position:sticky;top:0;z-index:100;background:rgba(11,14,23,.95);backdrop-filter:blur(16px);}
.brand h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;}
.brand h1 span{color:var(--green);}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:600px){.macro-grid{grid-template-columns:repeat(2,1fr);}}
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;display:flex;align-items:center;gap:12px;}
.mc-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.25rem;line-height:1;}
.mc.kcal .mc-val{color:var(--purple);} .mc.prot .mc-val{color:var(--green);}
.mc.carb .mc-val{color:var(--cyan);} .mc.fat .mc-val{color:var(--amber);}
.mc-label{font-size:.65rem;text-transform:uppercase;color:var(--muted);}
.main-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;}
@media(max-width:860px){.main-grid{grid-template-columns:1fr;}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.ai-panel{border:1px solid var(--green); position:relative;}
.ai-out{background:var(--bg3);border-radius:11px;padding:12px;min-height:80px;font-size:.8rem;margin-top:10px;}
.btn{background:var(--green);color:#000;border:none;font-family:'Syne',sans-serif;font-weight:700;padding:8px 14px;border-radius:9px;cursor:pointer;}
.btn.ai{background:linear-gradient(135deg,#3dd68c,#22d3ee);}
.inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:9px;outline:none;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;display:none;z-index:1000;}
.toast.show{display:block;}
.toast.err{background:var(--red);color:#fff;}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand"><h1>NutriTrack <span>· Nahuel</span></h1></div>
  </div>
</header>

<div class="wrap">
  <div class="macro-grid" id="macroGrid">
    <div class="mc kcal"><div class="mc-info"><div class="mc-val" id="mKcal">0</div><div class="mc-label">Calorías</div></div></div>
    <div class="mc prot"><div class="mc-info"><div class="mc-val" id="mProt">0g</div><div class="mc-label">Proteína</div></div></div>
    <div class="mc carb"><div class="mc-info"><div class="mc-val" id="mCarb">0g</div><div class="mc-label">Carbohidratos</div></div></div>
    <div class="mc fat"><div class="mc-info"><div class="mc-val" id="mFat">0g</div><div class="mc-label">Grasas</div></div></div>
  </div>

  <div class="main-grid">
    <div class="meals-col" id="mealsCol">
      </div>

    <div class="right-col">
      <div class="panel ai-panel">
        <div class="brand"><h3>Asistente IA</h3></div>
        <p style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;">Sugiere comidas basadas en tus macros faltantes.</p>
        <input type="password" id="apiKey" class="inp" style="width:100%; margin-bottom:10px;" placeholder="Pega tu Gemini API Key aquí">
        <button class="btn ai" id="aiBtn" onclick="askAI()" style="width:100%">✨ Sugerir Comida</button>
        <div class="ai-out" id="aiOut">Selecciona una comida para recibir sugerencias...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const TARGETS = {kcal:2800, prot:147, carb:371, fat:81};
let selectedMealForAI = "Almuerzo"; 

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type === 'err' ? 'err' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// FUNCIÓN CORREGIDA PARA GEMINI V1BETA
async function askAI() {
  const btn = document.getElementById('aiBtn');
  const out = document.getElementById('aiOut');
  const keyInp = document.getElementById('apiKey').value || localStorage.getItem('nutri_gemini_key');

  if (!keyInp) {
    showToast('Por favor, ingresa tu API Key', 'err');
    return;
  }
  localStorage.setItem('nutri_gemini_key', keyInp);

  const prompt = `Actúa como nutricionista. Sugiere 3 opciones para "${selectedMealForAI}" para un objetivo de 2800kcal. 
  Responde brevemente en español.`;

  btn.disabled = true;
  out.innerHTML = "Generando sugerencias...";

  try {
    // ENDPOINT Y ESTRUCTURA CORREGIDOS
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${keyInp}`;

    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: prompt }]
        }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'Error en la API');
    }

    // Extracción correcta del texto
    const aiText = data.candidates[0].content.parts[0].text;
    out.innerHTML = `<div style="white-space:pre-wrap;">${aiText}</div>`;

  } catch (e) {
    console.error(e);
    out.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  } finally {
    btn.disabled = false;
  }
}

// Inicialización básica de la interfaz
document.getElementById('apiKey').value = localStorage.getItem('nutri_gemini_key') || '';
</script>
</body>
</html>
